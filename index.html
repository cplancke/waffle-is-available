<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Waffle is Available</title>

</head>

<link rel="stylesheet" href="styles.css">
  
<body>

<h2>🧇 Waffle is Available 🧇</h2>

<button onclick="saveAvailability()">Save</button>
<button onclick="loadAvailability()">Load</button>
<button onclick="clearSelection()">Clear</button>

<div id="calendar"></div>

<script>

let eventId = new URLSearchParams(window.location.search).get("event");

if (!eventId) {
  eventId = Math.random().toString(36).substring(2);
  window.location.search = "?event=" + eventId;
}

const API = "https://magic.cplan079.workers.dev";

const calendar = document.getElementById("calendar");

const startHour = 9;
const endHour = 18;
const interval = 30;

let selectedSlots = new Set();
let isDragging = false;
//fix the bad highlighting
document.addEventListener("selectstart", e => e.preventDefault());
  
// ✅ Build calendar
function renderCalendar() {
  calendar.innerHTML = "";

  const days = ["Mon", "Tue", "Wed", "Thu", "Fri"];

  calendar.innerHTML += "<div class='header'>Time</div>";
  days.forEach(d => {
    calendar.innerHTML += `<div class="header">${d}</div>`;
  });

  for (let h = startHour; h < endHour; h++) {
    for (let m = 0; m < 60; m += interval) {
      const time = formatTime(h, m);

      calendar.innerHTML += `<div class="time-label">${time}</div>`;

      for (let d = 0; d < 5; d++) {
        const slotId = `${days[d]} ${time}`;

        calendar.innerHTML += `
          <div class="slot"
               data-slot="${slotId}">
          </div>
        `;
      }
    }
  }

  applySelection();
}

// ✅ Format time
function formatTime(hour, minute) {
  const ampm = hour >= 12 ? "PM" : "AM";
  const h = hour % 12 === 0 ? 12 : hour % 12;
  return `${h}:${String(minute).padStart(2,"0")} ${ampm}`;
}

// ✅ Toggle slot
calendar.addEventListener("mousedown", e => {
  if (e.target.classList.contains("slot")) {
    isDragging = true;
    toggleSlot(e.target);
  }
});

calendar.addEventListener("mouseover", e => {
  if (isDragging && e.target.classList.contains("slot")) {
    toggleSlot(e.target);
  }
});

document.addEventListener("mouseup", () => isDragging = false);

function toggleSlot(el) {
  const id = el.dataset.slot;

  if (selectedSlots.has(id)) {
    selectedSlots.delete(id);
    el.classList.remove("selected");
  } else {
    selectedSlots.add(id);
    el.classList.add("selected");
  }
}

function applySelection() {
  document.querySelectorAll(".slot").forEach(slot => {
    if (selectedSlots.has(slot.dataset.slot)) {
      slot.classList.add("selected");
    }
  });
}

// ✅ Clear
function clearSelection() {
  selectedSlots.clear();
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
}

// ✅ SAVE
async function saveAvailability() {
  const user = prompt("Your name:");

  await fetch(`${API}/save`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      eventId: "demo-event",
      user: user,
      slots: Array.from(selectedSlots)
    })
  });

  alert("Saved ✅");
}

// ✅ LOAD + HEATMAP
async function loadAvailability() {
  const res = await fetch(`${API}/event/demo-event`);
  const data = await res.json();

  const counts = {};

  Object.values(data).forEach(userSlots => {
    userSlots.forEach(slot => {
      counts[slot] = (counts[slot] || 0) + 1;
    });
  });

  document.querySelectorAll(".slot").forEach(slot => {
    const c = counts[slot.dataset.slot] || 0;

    if (c > 0) {
      slot.style.background = `rgba(0, 200, 0, ${c / 5})`;
    }
  });

  alert("Loaded ✅");
}

// ✅ Initial render
renderCalendar();

</script>

</body>
</html>
