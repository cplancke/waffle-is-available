<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Waffle is Available</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    .container {
      display: flex;
      gap: 20px;
    }

    .overlay {
      pointer-events: none;
    }

    #calendar,
    #overlayCalendar {
      display: grid;
      grid-template-columns: 120px repeat(5, 1fr);
      gap: 2px;
    }
  </style>
</head>

<body>

<h2>🧇 Waffle is Available 🧇</h2>

<button onclick="saveAvailability()">Save</button>
<button onclick="loadAvailability()">Load</button>
<button onclick="clearSelection()">Clear</button>
<button onclick="copyLink()">Share</button>

<div class="container">
  <div>
    <h3>My Availability</h3>
    <div id="calendar"></div>
  </div>

  <div>
    <h3>Group Availability</h3>
    <div id="overlayCalendar"></div>
  </div>
</div>
<div id="tooltip"></div>
<script>
const API = "https://magic.cplan079.workers.dev";

const calendar = document.getElementById("calendar");
const overlayCalendar = document.getElementById("overlayCalendar");
const tooltip = document.getElementById("tooltip");
let loadedAvailability = {};

const startHour = 9;
const endHour = 18;
const interval = 30;

let selectedSlots = new Set();
let isDragging = false;

document.addEventListener("selectstart", e => e.preventDefault());

let eventId = new URLSearchParams(window.location.search).get("event");

if (!eventId) {
  eventId = Math.random().toString(36).substring(2);
  window.location.search = "?event=" + eventId;
}

function renderCalendar() {
  calendar.innerHTML = "";
  overlayCalendar.innerHTML = "";

  const days = ["Mon", "Tue", "Wed", "Thu", "Fri"];

  calendar.innerHTML += "<div class='header'>Time</div>";
  overlayCalendar.innerHTML += "<div class='header'>Time</div>";

  days.forEach(d => {
    calendar.innerHTML += `<div class="header">${d}</div>`;
    overlayCalendar.innerHTML += `<div class="header">${d}</div>`;
  });

  for (let h = startHour; h < endHour; h++) {
    for (let m = 0; m < 60; m += interval) {
      const time = formatTime(h, m);

      calendar.innerHTML += `<div class="time-label">${time}</div>`;
      overlayCalendar.innerHTML += `<div class="time-label">${time}</div>`;

      for (let d = 0; d < 5; d++) {
        const slotId = `${days[d]} ${time}`;

        calendar.innerHTML += `<div class="slot" data-slot="${slotId}"></div>`;
        overlayCalendar.innerHTML += `<div class="slot overlay" data-slot="${slotId}"></div>`;
      }
    }
  }

  applySelection();
}

function formatTime(hour, minute) {
  const ampm = hour >= 12 ? "PM" : "AM";
  const h = hour % 12 === 0 ? 12 : hour % 12;
  return `${h}:${String(minute).padStart(2,"0")} ${ampm}`;
}

calendar.addEventListener("mousedown", e => {
  if (e.target.classList.contains("slot")) {
    isDragging = true;
    toggleSlot(e.target);
  }
});

calendar.addEventListener("mouseover", e => {
  if (isDragging && e.target.classList.contains("slot")) {
    toggleSlot(e.target);
  }
});

document.addEventListener("mouseup", () => isDragging = false);

function toggleSlot(el) {
  const id = el.dataset.slot;

  if (selectedSlots.has(id)) {
    selectedSlots.delete(id);
    el.classList.remove("selected");
  } else {
    selectedSlots.add(id);
    el.classList.add("selected");
  }
}

function applySelection() {
  calendar.querySelectorAll(".slot").forEach(slot => {
    if (selectedSlots.has(slot.dataset.slot)) {
      slot.classList.add("selected");
    }
  });
}

function clearSelection() {
  selectedSlots.clear();

  calendar.querySelectorAll(".slot").forEach(s => {
    s.classList.remove("selected");
  });

  overlayCalendar.querySelectorAll(".slot").forEach(s => {
    s.style.background = "";
    s.title = "";
  });
}

async function saveAvailability() {
  const user = prompt("Your name:");

  await fetch(`${API}/save`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      eventId: eventId,
      user: user,
      slots: Array.from(selectedSlots)
    })
  });

  alert("Saved ✅");
}

async function loadAvailability() {
  const res = await fetch(`${API}/event/${eventId}`);
  const data = await res.json();
  loadedAvailability = data;

  const counts = {};
  const namesBySlot = {};

  Object.entries(data).forEach(([user, slots]) => {
    slots.forEach(slot => {
      counts[slot] = (counts[slot] || 0) + 1;

      if (!namesBySlot[slot]) namesBySlot[slot] = [];
      namesBySlot[slot].push(user);
    });
  });

  overlayCalendar.querySelectorAll(".slot").forEach(slot => {
    const c = counts[slot.dataset.slot] || 0;

    slot.style.background = "";
    slot.title = "";

    if (c > 0) {
      slot.style.background = `rgba(0, 200, 0, ${c / 4})`;
    }
  });
}

function buildTooltipHtml(slotId) {
  const available = [];
  const unavailable = [];

  Object.entries(loadedAvailability).forEach(([user, slots]) => {
    if (slots.includes(slotId)) {
      available.push(user);
    } else {
      unavailable.push(user);
    }
  });

  return `
    <div><strong>${slotId}</strong></div>
    <div class="tooltip-section">
      <div class="tooltip-label">Available</div>
      <div>${available.length ? available.join(", ") : "Nobody"}</div>
    </div>
    <div class="tooltip-section">
      <div class="tooltip-label">Not available</div>
      <div>${unavailable.length ? unavailable.join(", ") : "Nobody"}</div>
    </div>
  `;
}

function showTooltip(slotId, x, y) {
  if (!loadedAvailability || Object.keys(loadedAvailability).length === 0) {
    tooltip.style.display = "none";
    return;
  }

  tooltip.innerHTML = buildTooltipHtml(slotId);
  tooltip.style.left = `${x + 14}px`;
  tooltip.style.top = `${y + 14}px`;
  tooltip.style.display = "block";
}

function hideTooltip() {
  tooltip.style.display = "none";
}
  
function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied ✅");
}

overlayCalendar.addEventListener("mousemove", (e) => {
  const slot = e.target.closest(".slot.overlay");
  if (!slot) {
    hideTooltip();
    return;
  }

  showTooltip(slot.dataset.slot, e.clientX, e.clientY);
});

overlayCalendar.addEventListener("mouseleave", () => {
  hideTooltip();
});

  
renderCalendar();

</script>

</body>
</html>
